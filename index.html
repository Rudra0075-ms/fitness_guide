<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Fitness Guide</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Fonts for modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', Arial, sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            margin: 50px auto;
            background: rgba(255,255,255,0.95);
            padding: 35px 30px 30px 30px;
            border-radius: 18px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: "";
            position: absolute;
            top: -60px;
            right: -60px;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #2d6cdf33 60%, transparent 100%);
            z-index: 0;
        }
        h1 {
            text-align: center;
            color: #2d6cdf;
            font-size: 2.4rem;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: 700;
            position: relative;
            z-index: 1;
        }
        label {
            display: block;
            margin-top: 18px;
            font-weight: 600;
            color: #2d6cdf;
            letter-spacing: 0.5px;
        }
        input, select {
            width: 100%;
            padding: 10px 12px;
            margin-top: 7px;
            border-radius: 7px;
            border: 1.5px solid #b6c6e2;
            background: #f7faff;
            font-size: 1rem;
            transition: border 0.2s;
            outline: none;
        }
        input:focus, select:focus {
            border: 1.5px solid #2d6cdf;
            background: #eaf2fb;
        }
        button {
            margin-top: 28px;
            width: 100%;
            padding: 13px;
            background: linear-gradient(90deg, #2d6cdf 60%, #5e9cff 100%);
            color: #fff;
            border: none;
            border-radius: 7px;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 2px 8px #b6c6e2;
            letter-spacing: 1px;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover {
            background: linear-gradient(90deg, #1b4fa0 60%, #2d6cdf 100%);
            transform: translateY(-2px) scale(1.03);
        }
        .result {
            margin-top: 35px;
            background: linear-gradient(120deg, #e8f0fe 80%, #f7faff 100%);
            padding: 24px 20px 18px 20px;
            border-radius: 12px;
            box-shadow: 0 2px 12px #cfd8e6;
            animation: fadeIn 0.7s;
            position: relative;
            z-index: 1;
        }
        .result h2 {
            color: #2d6cdf;
            margin-top: 0;
            font-size: 1.4rem;
            margin-bottom: 10px;
        }
        .result p {
            margin: 8px 0;
            color: #333;
            font-size: 1.05rem;
        }
        .result ul {
            margin: 12px 0 0 18px;
            padding: 0;
            color: #2d6cdf;
            font-size: 1.02rem;
        }
        .result ul li {
            margin-bottom: 6px;
            list-style: disc;
        }
        .motivation {
            margin-top: 22px;
            font-style: italic;
            color: #388e3c;
            text-align: center;
            font-size: 1.08rem;
            background: #e0f7e9;
            padding: 10px 8px;
            border-radius: 7px;
            box-shadow: 0 1px 4px #b6e2c6;
            animation: popIn 0.7s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px);}
            to { opacity: 1; transform: translateY(0);}
        }
        @keyframes popIn {
            0% { transform: scale(0.7); opacity: 0;}
            80% { transform: scale(1.1);}
            100% { transform: scale(1); opacity: 1;}
        }
        /* Decorative sparkles */
        .sparkle {
            position: absolute;
            width: 16px;
            height: 16px;
            pointer-events: none;
            z-index: 10;
            animation: sparkle 1.5s linear infinite;
        }
        @keyframes sparkle {
            0% { opacity: 0; transform: scale(0.5);}
            50% { opacity: 1; transform: scale(1.2);}
            100% { opacity: 0; transform: scale(0.5);}
        }
        /* Responsive */
        @media (max-width: 600px) {
            .container { padding: 18px 5vw 18px 5vw; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Fitness Guide</h1>
        <form id="fitnessForm">
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" min="10" max="100" required>

            <label for="gender">Gender:</label>
            <select id="gender" name="gender" required>
                <option value="">Select</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>

            <label for="weight">Weight (kg):</label>
            <input type="number" id="weight" name="weight" min="30" max="200" required>

            <label for="height">Height (cm):</label>
            <input type="number" id="height" name="height" min="100" max="250" required>

            <label for="activity">Activity Level:</label>
            <select id="activity" name="activity" required>
                <option value="">Select</option>
                <option value="sedentary">Sedentary (little or no exercise)</option>
                <option value="light">Lightly active (1-3 days/week)</option>
                <option value="moderate">Moderately active (3-5 days/week)</option>
                <option value="active">Active (6-7 days/week)</option>
            </select>

            <button type="submit">Get AI Diet Plan</button>
        </form>
        <div class="result" id="result" style="display:none;"></div>
        <!-- Sparkles for magic effect -->
        <svg class="sparkle" style="top:18px; left:18px;" viewBox="0 0 16 16">
            <polygon points="8,0 10,6 16,8 10,10 8,16 6,10 0,8 6,6" fill="#ffd700" opacity="0.7"/>
        </svg>
        <svg class="sparkle" style="top:60px; right:22px; animation-delay:0.7s;" viewBox="0 0 16 16">
            <polygon points="8,0 10,6 16,8 10,10 8,16 6,10 0,8 6,6" fill="#2d6cdf" opacity="0.5"/>
        </svg>
        <svg class="sparkle" style="bottom:30px; left:40px; animation-delay:1.1s;" viewBox="0 0 16 16">
            <polygon points="8,0 10,6 16,8 10,10 8,16 6,10 0,8 6,6" fill="#76ffea" opacity="0.6"/>
        </svg>
    </div>
    <script>
        function calculateBMI(weight, height) {
            return (weight / ((height / 100) ** 2)).toFixed(1);
        }

        function getCalorieNeeds(gender, weight, height, age, activity) {
            // Mifflin-St Jeor Equation
            let bmr;
            if (gender === 'male') {
                bmr = 10 * weight + 6.25 * height - 5 * age + 5;
            } else {
                bmr = 10 * weight + 6.25 * height - 5 * age - 161;
            }
            const activityFactors = {
                sedentary: 1.2,
                light: 1.375,
                moderate: 1.55,
                active: 1.725
            };
            return Math.round(bmr * activityFactors[activity]);
        }

        function getDietPlan(bmi, calorieNeeds) {
            if (bmi < 18.5) {
                return {
                    advice: "You are underweight. Focus on a calorie surplus with nutrient-rich foods.",
                    plan: [
                        "Eat 5-6 small meals a day.",
                        "Include nuts, dairy, lean meats, and whole grains.",
                        "Add healthy fats like olive oil and avocado.",
                        "Aim for at least " + (calorieNeeds + 300) + " kcal/day."
                    ]
                };
            } else if (bmi < 25) {
                return {
                    advice: "You have a normal weight. Maintain a balanced diet.",
                    plan: [
                        "Eat plenty of vegetables, fruits, and whole grains.",
                        "Include lean proteins (chicken, fish, tofu).",
                        "Limit processed foods and sugars.",
                        "Aim for " + calorieNeeds + " kcal/day."
                    ]
                };
            } else if (bmi < 30) {
                return {
                    advice: "You are overweight. Focus on a calorie deficit and regular exercise.",
                    plan: [
                        "Reduce portion sizes and avoid sugary drinks.",
                        "Eat more fiber-rich foods (vegetables, legumes).",
                        "Choose lean proteins and healthy fats.",
                        "Aim for " + (calorieNeeds - 300) + " kcal/day."
                    ]
                };
            } else {
                return {
                    advice: "You are obese. Consult a healthcare provider for personalized advice.",
                    plan: [
                        "Prioritize vegetables, lean proteins, and whole grains.",
                        "Avoid fried and processed foods.",
                        "Increase physical activity gradually.",
                        "Aim for " + (calorieNeeds - 500) + " kcal/day."
                    ]
                };
            }
        }

        function getMotivation() {
            const messages = [
                "Every step counts. Keep moving forward!",
                "Consistency is the key to success. You can do it!",
                "Small changes make a big difference over time.",
                "Believe in yourself and all that you are.",
                "Your journey to fitness starts with a single step.",
                "Stay positive, work hard, and make it happen!",
                "Progress, not perfection. Keep going!",
                "You are stronger than you think.",
                "Healthy habits create a healthy life.",
                "Don't give up. Great things take time."
            ];
            return messages[Math.floor(Math.random() * messages.length)];
        }

        document.getElementById('fitnessForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const age = parseInt(document.getElementById('age').value);
            const gender = document.getElementById('gender').value;
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);
            const activity = document.getElementById('activity').value;

            const bmi = calculateBMI(weight, height);
            const calorieNeeds = getCalorieNeeds(gender, weight, height, age, activity);
            const diet = getDietPlan(bmi, calorieNeeds);
            const motivation = getMotivation();

            document.getElementById('result').style.display = 'block';
            document.getElementById('result').innerHTML = `
                <h2>Your AI Diet Plan</h2>
                <p><strong>BMI:</strong> ${bmi}</p>
                <p><strong>Daily Calorie Needs:</strong> ${calorieNeeds} kcal</p>
                <p><strong>Advice:</strong> ${diet.advice}</p>
                <ul>${diet.plan.map(item => `<li>${item}</li>`).join('')}</ul>
                <div class="motivation">${motivation}</div>
            `;
            // Scroll to result for better UX
            setTimeout(() => {
                document.getElementById('result').scrollIntoView({behavior: 'smooth'});
            }, 100);
        });
    </script>
</body>
</html></svg>
